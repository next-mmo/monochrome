name: Lighthouse

on:
    workflow_dispatch:
    push:
        branches: [main]

jobs:
    lighthouse:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Cache dependencies
              uses: actions/cache@v3
              with:
                  path: |
                      ./bun_modules
                      ./node_modules
                      ./bun.lock
                  key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

            - name: Install dependencies
              run: bun install

            - name: Build
              run: bun run build

            - name: Preview build
              run: bun run preview &
              continue-on-error: true

            - name: Wait for preview server
              run: sleep 10

            - name: Run Lighthouse
              run: |
                  npx lhci autorun --config=.lhci.yml || true

            - name: Upload results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: lighthouse-results
                  path: .lighthouseci/
